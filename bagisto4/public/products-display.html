<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Danh sách Sản phẩm</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 1200px;
            margin: 20px auto;
            padding: 0 20px;
            background: #f5f5f5;
        }
        .header {
            background: white;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid #ddd;
            text-align: center;
        }
        .header h1 {
            margin: 0 0 10px 0;
            color: #333;
        }
        .student-info {
            background: #007bff;
            color: white;
            padding: 10px 20px;
            border-radius: 5px;
            display: inline-block;
            font-weight: bold;
        }
        .products {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .product-card {
            background: white;
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        .product-name {
            font-size: 1.2em;
            font-weight: bold;
            margin-bottom: 10px;
            color: #333;
        }
        .product-price {
            color: #007bff;
            font-size: 1.5em;
            font-weight: bold;
            margin: 10px 0;
        }
        .product-description {
            color: #666;
            margin-bottom: 15px;
            line-height: 1.5;
        }
        .btn-detail {
            background: #007bff;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
        }
        .btn-detail:hover {
            background: #0056b3;
        }
        .loading {
            text-align: center;
            padding: 50px;
            font-size: 1.2em;
        }
        .error {
            background: #ff4444;
            color: white;
            padding: 20px;
            border-radius: 5px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Danh sách Sản phẩm</h1>
        <div class="student-info">
            Nguyễn Trần Xuân Bắc - MSSV: 23810310100
        </div>
    </div>

    <div id="loading" class="loading">Đang tải...</div>
    <div id="error" class="error" style="display: none;"></div>
    <div id="products" class="products"></div>

    <script>
        // Log thông tin sinh viên vào console (yêu cầu bài tập)
        console.log("Bài làm của: Nguyễn Trần Xuân Bắc - MSSV: 238310100");

        // Hàm gọi GraphQL API để lấy danh sách sản phẩm
        async function fetchProducts() {
            try {
                // Định nghĩa GraphQL query để lấy 5 sản phẩm với các trường cần thiết
                const query = `query { products(limit: 5) { id name price description url_key } }`;
                
                // Gọi API GraphQL endpoint bằng fetch (POST request)
                const response = await fetch('/graphql', {
                    method: 'POST', // GraphQL luôn dùng POST
                    headers: { 'Content-Type': 'application/json' }, // Header bắt buộc
                    body: JSON.stringify({ query }) // Gửi query dưới dạng JSON
                });

                // Parse response JSON từ server
                const result = await response.json();

                // Kiểm tra nếu có lỗi từ GraphQL
                if (result.errors) {
                    throw new Error(result.errors[0].message);
                }

                // Hiển thị danh sách sản phẩm lên giao diện
                displayProducts(result.data.products);

            } catch (error) {
                // Xử lý lỗi và hiển thị thông báo
                console.error('Lỗi:', error);
                document.getElementById('loading').style.display = 'none';
                document.getElementById('error').style.display = 'block';
                document.getElementById('error').textContent = 'Lỗi: ' + error.message;
            }
        }

        // Hàm định dạng giá tiền theo chuẩn Việt Nam
        function formatPrice(price) {
            return new Intl.NumberFormat('vi-VN', {
                style: 'currency',
                currency: 'VND'
            }).format(price);
        }

        // Hàm hiển thị danh sách sản phẩm lên giao diện
        function displayProducts(products) {
            document.getElementById('loading').style.display = 'none';
            
            const container = document.getElementById('products');
            
            if (!products || products.length === 0) {
                container.innerHTML = '<p style="text-align: center;">Không có sản phẩm.</p>';
                return;
            }

            // Tạo HTML cho từng sản phẩm và hiển thị
            container.innerHTML = products.map(product => `
                <div class="product-card">
                    <div class="product-name">${product.name || 'Không có tên'}</div>
                    <div class="product-price">${formatPrice(product.price || 0)}</div>
                    <div class="product-description">
                        ${product.description ? product.description.substring(0, 100) + '...' : 'Không có mô tả'}
                    </div>
                    <button class="btn-detail" onclick="alert('Chi tiết: ${product.url_key}')">
                        Chi tiết
                    </button>
                </div>
            `).join('');
        }

        // Gọi hàm fetchProducts khi trang web load xong
        window.addEventListener('DOMContentLoaded', fetchProducts);
    </script>
</body>
</html>
